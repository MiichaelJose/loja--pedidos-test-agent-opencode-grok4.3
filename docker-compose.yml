version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb-loja
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/mongo-keyfile:/etc/mongo-keyfile:ro
    command: ["--replSet", "rs0", "--keyFile", "/etc/mongo-keyfile", "--bind_ip_all"]
    healthcheck:
      test: |
        mongosh --quiet --eval '
          try { 
            rs.status().ok 
          } catch (e) { 
            0 
          }
        '
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:alpine
    container_name: redis-loja
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
